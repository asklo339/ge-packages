name: Build libdrm for aarch64 and x86_64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, x86_64]  # This creates two parallel jobs: one for aarch64, one for x86_64.
    steps:
      # Step 1: Checkout the repository.
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Build the Docker image using your Dockerfile.
      - name: Build Docker image
        run: |
          docker build -t droidvine-compiler .

      # Step 3: Run the Docker container to build libdrm.
      # Here, the run command creates an output directory specific to the architecture,
      # then runs the container with the appropriate flag (--aarch64 or --x86_64) passed
      # to your build-package.sh script.
      - name: Run build for libdrm on ${{ matrix.arch }}
        run: |
          mkdir -p output/${{ matrix.arch }}
          docker run --rm -v "${{ github.workspace }}/output/${{ matrix.arch }}:/output" droidvine-compiler \
            ./build-package.sh --${{ matrix.arch }} libdrm

      # Step 4: Upload the build artifacts for the specific architecture.
      - name: Upload artifact for ${{ matrix.arch }}
        uses: actions/upload-artifact@v3
        with:
          name: libdrm-${{ matrix.arch }}
          path: output/${{ matrix.arch }}
